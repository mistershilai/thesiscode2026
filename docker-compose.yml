services:
  # OSRM routing engine for Botswana road distances
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    volumes:
      - ./osrm_project:/data
    command: osrm-routed --algorithm mld /data/botswana-latest.osrm
    ports:
      - "5001:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/nearest/v1/driving/25.9,-24.6"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Kaelo app (backend + frontend)
  kaelo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OSRM_URL=http://osrm:5000
      - CORS_ORIGINS=*
    volumes:
      # Persist data changes (drugs, facilities, matrices)
      - ./facilities_with_warehouses.csv:/data/facilities_with_warehouses.csv
      - ./distance_matrix_named.csv:/data/distance_matrix_named.csv
      - ./duration_matrix_named.csv:/data/duration_matrix_named.csv
      - ./national_pipeline/antimicrobials.csv:/data/national_pipeline/antimicrobials.csv
    depends_on:
      osrm:
        condition: service_healthy
    restart: unless-stopped
